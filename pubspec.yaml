name: gleam_ble_led
description: Mobile BLE LED Controller for Android - Flutter port of GleamBLEled
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.31.0
  shared_preferences: ^2.2.0
  flutter_colorpicker: ^1.0.3
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
